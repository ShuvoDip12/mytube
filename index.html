```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamTube Pro Auto</title>

<!-- ✅ FIXED FAVICON -->
<link rel="icon" href="https://i.ibb.co/zWYxwgPk/favicon.jpg">
<link rel="shortcut icon" href="https://i.ibb.co/zWYxwgPk/favicon.jpg">

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}

.navbar{
display:flex;gap:10px;align-items:center;padding:10px;background:#000;
position:sticky;top:0;z-index:999;
}

.logo{color:red;font-size:20px;font-weight:bold}

.search{
width:180px;
padding:7px 10px;
border-radius:20px;
border:none;
outline:none;
background:#222;
color:white;
}

.categories{display:flex;gap:10px;padding:10px;overflow:auto}
.cat{background:#222;padding:6px 12px;border-radius:20px;cursor:pointer}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:8px;padding:8px
}

.video{
background:#111;border-radius:10px;overflow:hidden;cursor:pointer;
transition:0.25s;position:relative;
}
.video:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(255,0,0,0.5);
}

.video img{width:100%;height:130px;object-fit:cover}

.title{padding:6px;font-size:13px}

#player{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;display:none;flex-direction:column;z-index:1000;
animation:fadeIn 0.3s ease;
}

iframe{width:100%;height:85%;border:none}

.controls{
position:absolute;bottom:20px;left:50%;
transform:translateX(-50%);
display:flex;gap:10px
}

button{
padding:6px 10px;background:#222;color:white;border:none;
border-radius:20px;cursor:pointer;
}
button:hover{background:red}

#adOverlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:black;display:none;justify-content:center;
align-items:center;flex-direction:column;z-index:2000;
text-align:center;padding:20px
}

@keyframes fadeIn{
from{opacity:0}to{opacity:1}
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">🎬 SDBD</div>
<button onclick="showHome()">Home</button>
<button onclick="showLiveTV()">Live TV</button>
<input id="search" class="search" placeholder="Search videos...">
</div>

<div class="categories">
<div class="cat" onclick="setCategory('all')">All</div>
<div class="cat" onclick="setCategory('music')">Music</div>
<div class="cat" onclick="setCategory('tech')">Tech</div>
<div class="cat" onclick="setCategory('fun')">Fun</div>
</div>

<div class="grid" id="videoGrid"></div>

<div id="player">
<iframe id="ytplayer" allow="autoplay"></iframe>
<div class="controls">
<button onclick="prevVideo()">Prev</button>
<button onclick="downloadVideo()">Download</button>
<button onclick="closePlayer()">Close</button>
<button onclick="nextVideo()">Next ▶</button>
</div>
</div>

<div id="adOverlay">
<h2>Advertisement</h2>
<p>Ad will close in 5 seconds...</p>
<button id="skipBtn" onclick="closeAd()" style="display:none">Skip Ad</button>
</div>

<script>

// ================= DATA =================
const YT_IDS=[
"x2SeyqGjySs","iXxg3DYaafo","EiDNpufhRbs"
];

const DRIVE_VIDEOS=[
{
id:'18xsDHkCxJOFgQgxVXJuTBJ2c8McoZN-8',
title:'Major',
cat:'fun',
thumb:"https://i.postimg.cc/zvPNKsk4/MV5B.jpg"
}
];

const IPTV_STREAMS=[
{
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
title:"Somay TV",
cat:'fun'
}
];

// ================= STATE =================
let homeVideos=[],liveVideos=[],videos=[],filtered=[];
let currentIndex=0,currentCategory="all";

// ================= YOUTUBE =================
async function loadYouTube(){
for (let id of YT_IDS) {
try {
let res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
let data = await res.json();

homeVideos.unshift({
type:'yt',
id:id,
title:data.title,
cat:'music',
thumb:`https://img.youtube.com/vi/${id}/0.jpg`
});

} catch {
homeVideos.unshift({
type:'yt',
id:id,
title:'YouTube Video',
cat:'music',
thumb:`https://img.youtube.com/vi/${id}/0.jpg`
});
}
}
applyFilters();
}

// ================= DRIVE =================
function loadDrive(){
DRIVE_VIDEOS.forEach(v=>{
homeVideos.unshift({...v,type:'drive'});
});
}

// ================= IPTV =================
function loadIPTV(){
IPTV_STREAMS.forEach(v=>{
liveVideos.unshift({...v,type:'iptv'});
});
}

// ================= MODE =================
function showHome(){videos=homeVideos;applyFilters()}
function showLiveTV(){videos=liveVideos;applyFilters()}

// ================= FILTER =================
function applyFilters(){
let s=document.getElementById('search').value.toLowerCase();

filtered=videos.filter(v=>
(currentCategory==='all'||v.cat===currentCategory) &&
(v.title.toLowerCase().includes(s) || v.cat.toLowerCase().includes(s))
);

render();
}

function setCategory(c){currentCategory=c;applyFilters()}
document.getElementById('search').addEventListener('input',applyFilters);

// ================= RENDER =================
function render(){
let grid=document.getElementById('videoGrid');
grid.innerHTML='';

filtered.forEach((v,i)=>{
let div=document.createElement('div');
div.className='video';

div.innerHTML=`
<div style="position:relative">
<img src="${v.thumb}">
<span style="position:absolute;bottom:5px;right:5px;background:black;padding:2px 5px;font-size:10px">HD</span>
</div>
<div class="title">${v.title}</div>
`;

div.onclick=()=>playVideo(i);
grid.appendChild(div);
});
}

// ================= PLAYER =================
function startVideo(i){
currentIndex=i;
document.getElementById('player').style.display='flex';

let v=filtered[i],url='';

if(v.type==='yt'){
url=`https://www.youtube.com/embed/${v.id}?autoplay=1&enablejsapi=1`;
}
else if(v.type==='drive'){
url=`https://drive.google.com/file/d/${v.id}/preview`;
}
else{
url=v.url;
}

document.getElementById('ytplayer').src=url;
}

function playVideo(i){showAd(()=>startVideo(i))}
function nextVideo(){showAd(()=>startVideo((currentIndex+1)%filtered.length))}
function prevVideo(){startVideo((currentIndex-1+filtered.length)%filtered.length)}

function closePlayer(){
document.getElementById('player').style.display='none';
document.getElementById('ytplayer').src='';
}

// ================= AUTO NEXT =================
let player;

function onYouTubeIframeAPIReady(){
player=new YT.Player('ytplayer',{
events:{'onStateChange':onPlayerStateChange}
});
}

function onPlayerStateChange(e){
if(e.data===0) nextVideo();
}

let tag=document.createElement('script');
tag.src="https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

// ================= AD =================
let adLink="https://www.profitablecpmratenetwork.com";

function showAd(callback){
document.getElementById('adOverlay').style.display='flex';
window.open(adLink,'_blank');
window.adCallback=callback;

let t=5,p=document.querySelector('#adOverlay p');
let btn=document.getElementById('skipBtn');
btn.style.display='none';

let timer=setInterval(()=>{
t--;
if(t>0){
p.innerText=`Ad will close in ${t} seconds...`;
}else{
p.innerText="You can now skip";
btn.style.display='block';
clearInterval(timer);
}
},1000);
}

function closeAd(){
document.getElementById('adOverlay').style.display='none';
if(window.adCallback) window.adCallback();
}

// ================= INIT =================
async function init(){
await loadYouTube();
loadDrive();
loadIPTV();
showHome();
}
init();

</script>

</body>
</html>
```
