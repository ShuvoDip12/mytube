<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamTube Pro Auto</title>

<link rel="icon" href="https://i.ibb.co/zWYxwgPk/favicon.jpg">

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}

.navbar{
display:flex;gap:10px;align-items:center;padding:10px;background:#000;
position:sticky;top:0;z-index:999;
}

.logo{color:red;font-size:20px;font-weight:bold}

.search{
width:180px;
padding:7px 10px;
border-radius:20px;
border:none;
outline:none;
background:#222;
color:white;
}

.categories{display:flex;gap:10px;padding:10px;overflow:auto}
.cat{background:#222;padding:6px 12px;border-radius:20px;cursor:pointer}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:8px;padding:8px
}

.video{
background:#111;border-radius:10px;overflow:hidden;cursor:pointer;
transition:0.25s;position:relative;
}
.video:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(255,0,0,0.5);
}

.video img{width:100%;height:130px;object-fit:cover}
.title{padding:6px;font-size:13px}

#player{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;display:none;flex-direction:column;z-index:1000;
}

iframe{width:100%;height:85%;border:none}

.controls{
position:absolute;bottom:20px;left:50%;
transform:translateX(-50%);
display:flex;gap:10px;align-items:center;
}

button{
padding:6px 10px;background:#222;color:white;border:none;
border-radius:20px;cursor:pointer;
}
button:hover{background:red}

select{
background:#222;color:white;border:none;padding:6px;border-radius:10px;
}

#adOverlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:black;display:none;justify-content:center;
align-items:center;flex-direction:column;z-index:2000;
text-align:center;padding:20px
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">🎬 SDBD</div>
<button onclick="showHome()">Home</button>
<button onclick="showLiveTV()">Live TV</button>
<input id="search" class="search" placeholder="Search...">
</div>

<div class="categories">
<div class="cat" onclick="setCategory('all')">All</div>
<div class="cat" onclick="setCategory('music')">Music</div>
<div class="cat" onclick="setCategory('tech')">Tech</div>
<div class="cat" onclick="setCategory('fun')">Fun</div>
</div>

<div class="grid" id="videoGrid"></div>

<div id="player">
<iframe id="ytplayer" allow="autoplay"></iframe>

<div class="controls">
<button onclick="prevVideo()">Prev</button>

<select id="driveQualitySelect" style="display:none" onchange="setDriveQuality()"></select>

<button onclick="downloadVideo()">Download</button>
<button onclick="closePlayer()">Close</button>
<button onclick="nextVideo()">Next ▶</button>
</div>
</div>

<script>

// ================= DATA =================
const YT_IDS=["x2SeyqGjySs","iXxg3DYaafo"];

const DRIVE_VIDEOS=[
{
title:'Major',
cat:'fun',
thumb:"https://i.postimg.cc/zvPNKsk4/MV5B.jpg",
qualities:[
{label:"720p",id:"18xsDHkCxJOFgQgxVXJuTBJ2c8McoZN-8"},
{label:"1080p",id:"18xsDHkCxJOFgQgxVXJuTBJ2c8McoZN-8"}
]
}
];

const IPTV_STREAMS=[];

// ================= STATE =================
let homeVideos=[],liveVideos=[],videos=[],filtered=[];
let currentIndex=0,currentCategory="all";
let selectedDriveId=null;

// ================= LOAD =================
async function loadYouTube(){
for(let id of YT_IDS){
homeVideos.unshift({
type:'yt',
id,
title:"YouTube Video",
cat:'music',
thumb:`https://img.youtube.com/vi/${id}/0.jpg`
});
}
applyFilters();
}

function loadDrive(){
DRIVE_VIDEOS.forEach(v=>{
homeVideos.unshift({...v,type:'drive'});
});
}

function loadIPTV(){
liveVideos=[];
}

// ================= MODE =================
function showHome(){videos=homeVideos;applyFilters()}
function showLiveTV(){videos=liveVideos;applyFilters()}

// ================= FILTER =================
function applyFilters(){
let s=document.getElementById('search').value.toLowerCase();

filtered=videos.filter(v=>
(currentCategory==='all'||v.cat===currentCategory) &&
v.title.toLowerCase().includes(s)
);

render();
}

function setCategory(c){currentCategory=c;applyFilters()}
document.getElementById('search').addEventListener('input',applyFilters);

// ================= RENDER =================
function render(){
let grid=document.getElementById('videoGrid');
grid.innerHTML='';

filtered.forEach((v,i)=>{
let div=document.createElement('div');
div.className='video';

div.innerHTML=`
<img src="${v.thumb}">
<div class="title">${v.title}</div>
`;

div.onclick=()=>playVideo(i);
grid.appendChild(div);
});
}

// ================= PLAYER =================
function startVideo(i){
currentIndex=i;
document.getElementById('player').style.display='flex';

let v=filtered[i];
let url='';

if(v.type==='yt'){
url=`https://www.youtube.com/embed/${v.id}?autoplay=1`;
document.getElementById('driveQualitySelect').style.display='none';
}

else if(v.type==='drive'){
document.getElementById('driveQualitySelect').style.display='block';
document.getElementById('driveQualitySelect').innerHTML='';

v.qualities.forEach(q=>{
let opt=document.createElement('option');
opt.value=q.id;
opt.textContent=q.label;
document.getElementById('driveQualitySelect').appendChild(opt);
});

selectedDriveId=v.qualities[0].id;
url=`https://drive.google.com/file/d/${selectedDriveId}/preview`;
document.getElementById('driveQualitySelect').value=selectedDriveId;
}

document.getElementById('ytplayer').src=url;
}

function playVideo(i){startVideo(i)}

function nextVideo(){
startVideo((currentIndex+1)%filtered.length);
}

function prevVideo(){
startVideo((currentIndex-1+filtered.length)%filtered.length);
}

function closePlayer(){
document.getElementById('player').style.display='none';
document.getElementById('ytplayer').src='';
}

// ================= DRIVE QUALITY =================
function setDriveQuality(){
selectedDriveId=document.getElementById('driveQualitySelect').value;

let url=`https://drive.google.com/file/d/${selectedDriveId}/preview`;
document.getElementById('ytplayer').src=url;
}

// ================= DOWNLOAD =================
function downloadVideo(){
let v=filtered[currentIndex];

if(v.type==='drive'){
let url=`https://drive.google.com/uc?export=download&id=${selectedDriveId}`;
let a=document.createElement('a');
a.href=url;
a.target="_blank";
a.click();
}

else{
alert("Download not supported");
}
}

// ================= INIT =================
async function init(){
await loadYouTube();
loadDrive();
loadIPTV();
showHome();
}
init();

</script>

</body>
</html>
