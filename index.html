<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDBD</title>
<link rel="icon" type="image/jpeg" href="https://i.ibb.co.com/zWYxwgPk/favicon.jpg">

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}
.navbar{display:flex;gap:10px;align-items:center;padding:10px;background:#000}
.logo{color:red;font-size:20px;font-weight:bold}
.search{flex:0.6;max-width:220px;padding:8px;border-radius:5px;border:none}
.categories{display:flex;gap:10px;padding:10px;overflow:auto}
.cat{background:#222;padding:6px 12px;border-radius:20px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:8px}
.video{background:#111;border-radius:8px;overflow:hidden;cursor:pointer;transition:0.3s}
.video:hover{transform:scale(1.04)}
.video img{width:100%;height:130px;object-fit:cover}
.title{padding:5px;font-size:12px}

#player{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;flex-direction:column;z-index:1000}
iframe{width:100%;height:85%;border:none}
.controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
button{padding:8px;background:red;color:white;border:none;border-radius:5px;cursor:pointer}

#adOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;justify-content:center;align-items:center;flex-direction:column;z-index:2000;text-align:center;padding:20px}
#adOverlay button{margin-top:20px;background:green}

@media (max-width:768px){
.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
.search{max-width:160px;flex:0.7;}
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">🎬 SDBD</div>
<button onclick="showHome()">Home</button>
<button onclick="showLiveTV()">Live TV</button>
<input id="search" class="search" placeholder="Search videos...">
</div>

<div class="categories">
<div class="cat" onclick="setCategory('all')">All</div>
<div class="cat" onclick="setCategory('music')">Music</div>
<div class="cat" onclick="setCategory('tech')">Tech</div>
<div class="cat" onclick="setCategory('fun')">Fun</div>
</div>

<div class="grid" id="videoGrid"></div>

<div id="player">
<iframe id="ytplayer" allow="autoplay; fullscreen"></iframe>
<div class="controls">
<button onclick="prevVideo()">Prev</button>
<button onclick="downloadVideo()">Download</button>
<button onclick="closePlayer()">Close</button>
<button onclick="nextVideo()">Next ▶</button>
</div>
</div>

<div id="adOverlay">
<h2>Advertisement</h2>
<p>Ad will close in 5 seconds...</p>
<button id="skipBtn" onclick="closeAd()" style="display:none">Skip Ad</button>
</div>

<script>

const YT_IDS = [
"qqaGksZmZO8","MxPIpiUogL4","x2SeyqGjySs","iXxg3DYaafo","EiDNpufhRbs","4jtbe0I1e1c","aVTjBBAiIy0","7MwCamRDxKg","sSb9s3r45FI","4CM3oBgL194","HMW3OeNif5k","nE68cipbGb0","YQvz0-3e2Bw","bHJ3qIrVF8A","E-dk8ii4uXA"
];

const DRIVE_VIDEOS = [
{ id:'18xsDHkCxJOFgQgxVXJuTBJ2c8McoZN-8', title:'Major', cat:'fun', thumb:"https://i.postimg.cc/zvPNKsk4/MV5BOWE4Mjg2Mz-Yt-ODcz-MC00Yj-Uz-LTg4NDEt-Nzcw-NGI1Nj-Vk-Yj-Mw-Xk-Ey-Xk-Fqc-Gc-V1-QL75-UY281-CR4-0-1.jpg" },
{ id:'17ORdpO3KVLIWu2jrFYTQkgwWsBQ3pk1c', title:'অ্যাকসান', cat:'tech', thumb:"https://i.ibb.co.com/d4YHskXz/Screenshot-354.png" },
{ id:'1gLLfRX_3aq5u91qPXghQWkElB2xADqcx', title:'Ustaad Bhagat Singh', cat:'tech', thumb:"https://i.ibb.co.com/5gqxHNxp/Aura-of-Ustaad-From-Ustaad-Bhagat-Singh-Telugu-2026-20260222142634-500x500.jpg" },
{ id:'1gLLfRX_3aq5u91qPXghQWkElB2xADqcx', title:'The-Kerala-Story-2', cat:'tech', thumb:"https://i.ibb.co.com/DDcT1QrV/The-Kerala-Story-2.jpg" },
{ id:'1gLLfRX_3aq5u91qPXghQWkElB2xADqcx', title:'Jana Nayagan', cat:'tech', thumb:"https://i.ibb.co.com/GfKtC1vv/MV5-BNDc0-NTEz-Mj-Yt-OWEx-ZS00-M2-Ew-LTk5-Mzgt-OTMx-YTg3-Nm-Mx-Zm-Mz-Xk-Ey-Xk-Fqc-Gc-V1-FMjpg-UX1000.jpg" }
];

const IPTV_STREAMS = [
{ url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", title:"Somay TV", cat:'fun', thumb:"https://i.postimg.cc/j25jNQyn/images.png" },
{ url:"https://example.com/live2.m3u8", title:"News Live", cat:'tech', thumb:"https://i.ibb.co/3WZQ9kG/video.png" }
];

let homeVideos = [];
let liveVideos = [];
let videos = [];
let filtered = [];
let currentIndex = 0;
let currentCategory = "all";
let globalOrder = 0;

async function loadYouTube(){
for (let id of YT_IDS) {
try {
let res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
let data = await res.json();

homeVideos.push({
type:'yt',
id:id,
title:data.title,
cat:'music',
thumb:`https://img.youtube.com/vi/${id}/0.jpg`,
_order: globalOrder++
});
} catch {
homeVideos.push({
type:'yt',
id:id,
title:'YouTube Video',
cat:'music',
thumb:`https://img.youtube.com/vi/${id}/0.jpg`,
_order: globalOrder++
});
}
}
applyFilters();
}

function loadDrive(){
for (let v of DRIVE_VIDEOS) {
homeVideos.push({
type:'drive',
id:v.id,
title:v.title,
cat:v.cat,
thumb: v.thumb ? v.thumb : 'https://i.ibb.co/3WZQ9kG/video.png',
_order: globalOrder++
});
}
}

function loadIPTV(){
for (let v of IPTV_STREAMS) {
liveVideos.push({
type:'iptv',
url:v.url,
title:v.title,
cat:v.cat,
thumb: v.thumb ? v.thumb : 'https://i.ibb.co/3WZQ9kG/video.png',
_order: globalOrder++
});
}
}

function showHome(){ videos = homeVideos; currentCategory='all'; applyFilters(); }
function showLiveTV(){ videos = liveVideos; currentCategory='all'; applyFilters(); }

function applyFilters(){
let search = document.getElementById('search').value.toLowerCase();

let sortedVideos = [...videos].sort((a,b)=>(b._order||0)-(a._order||0));

filtered = sortedVideos.filter(v=>{
let c = (currentCategory==='all' || v.cat===currentCategory);
let s = v.title.toLowerCase().includes(search) || v.cat.toLowerCase().includes(search);
return c && s;
});

render();
}

function setCategory(c){ currentCategory=c; applyFilters(); }

document.getElementById('search').addEventListener('input',applyFilters);

function render(){
let grid=document.getElementById('videoGrid');
grid.innerHTML='';

filtered.forEach((v,i)=>{
let div=document.createElement('div');
div.className='video';
div.innerHTML=`<img src="${v.thumb}"><div class="title">${v.title}</div>`;
div.onclick=()=>playVideo(i);
grid.appendChild(div);
});
}

function startVideo(i){
currentIndex=i;
document.getElementById('player').style.display='flex';

let v=filtered[i];
let url='';

if(v.type==='yt') url=`https://www.youtube.com/embed/${v.id}?autoplay=1`;
else if(v.type==='drive') url=`https://drive.google.com/file/d/${v.id}/preview`;
else url=v.url;

document.getElementById('ytplayer').src=url;
}

function playVideo(i){ showAd(()=>startVideo(i)); }
function nextVideo(){ let i=(currentIndex+1)%filtered.length; showAd(()=>startVideo(i)); }
function prevVideo(){ let i=(currentIndex-1+filtered.length)%filtered.length; startVideo(i); }

function closePlayer(){
document.getElementById('player').style.display='none';
document.getElementById('ytplayer').src='';
}

function downloadVideo(){ showAd(()=>doDownload()); }

function doDownload(){
let v=filtered[currentIndex];
if(v.type==='drive') window.open(`https://drive.google.com/uc?export=download&id=${v.id}`,'_blank');
else if(v.type==='iptv') window.open(v.url,'_blank');
else alert("YouTube download not supported");
}

let adLink="https://www.profitablecpmratenetwork.com/gzywu16wk?key=ca82fe8f794a452da2f57a8630e672b3";

function showAd(callback){
document.getElementById('adOverlay').style.display='flex';
window.open(adLink,'_blank');
window.adCallback=callback;

let timeLeft=5;
let p=document.querySelector('#adOverlay p');
let btn=document.getElementById('skipBtn');

btn.style.display='none';
p.innerText=`Ad will close in ${timeLeft} seconds...`;

let timer=setInterval(()=>{
timeLeft--;
if(timeLeft>0) p.innerText=`Ad will close in ${timeLeft} seconds...`;
else { p.innerText=`You can now skip the ad`; btn.style.display='block'; clearInterval(timer); }
},1000);
}

function closeAd(){
document.getElementById('adOverlay').style.display='none';
document.getElementById('skipBtn').style.display='none';
if(window.adCallback) window.adCallback();
}

async function init(){
await loadYouTube();
loadDrive();
loadIPTV();
showHome();
}

init();

</script>

</body>
</html>
